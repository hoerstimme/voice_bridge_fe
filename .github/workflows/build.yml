name: Build and Push to ACR

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr login --name hoerstimmeacr
          docker build --platform linux/amd64 -t hoerstimmeacr.azurecr.io/voice-bridge-fe:${{ github.sha }} .
          docker push hoerstimmeacr.azurecr.io/voice-bridge-fe:${{ github.sha }}
